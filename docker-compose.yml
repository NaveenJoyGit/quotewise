services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quotewise
      POSTGRES_PASSWORD: quotewise
      POSTGRES_DB: quotewise
    volumes:
      - quotewise_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotewise -d quotewise"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  quotewise_pg_data:
