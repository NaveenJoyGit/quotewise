services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quotewise
      POSTGRES_PASSWORD: quotewise
      POSTGRES_DB: quotewise
    volumes:
      - quotewise_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quotewise -d quotewise"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Database migrations (run-once) ----
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quotewise:quotewise@postgres:5432/quotewise
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quotewise:quotewise@postgres:5432/quotewise
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ${GCP_SA_FILE_HOST_PATH:-./serviceaccount.json}:/secrets/serviceaccount.json:ro
      - quotewise_pdfs:/app/backend/data/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---- Celery Worker ----
  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quotewise:quotewise@postgres:5432/quotewise
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ${GCP_SA_FILE_HOST_PATH:-./serviceaccount.json}:/secrets/serviceaccount.json:ro
      - quotewise_pdfs:/app/backend/data/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info", "--concurrency=2"]

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  quotewise_pg_data:
  quotewise_pdfs:
